name: Label stale pending-contributor issues

on:
  schedule:
    - cron: '0 * * * *'  # hourly
  workflow_dispatch:

jobs:
  check-stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const CONTRIBUTOR = 'pending-contributor';
            const CLOSING = 'closing-soon';
            const STALE_DAYS = 7;
            const cutoff = new Date(Date.now() - STALE_DAYS * 24 * 60 * 60 * 1000);

            const issues = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: CONTRIBUTOR,
              per_page: 100
            });

            for (const issue of issues.data) {
              if (issue.pull_request) continue;
              const labels = issue.labels.map(l => l.name);
              if (labels.includes(CLOSING)) continue;

              // Find when pending-contributor was last applied
              const { data: events } = await github.rest.issues.listEvents({
                ...context.repo,
                issue_number: issue.number,
                per_page: 100
              });

              const labelEvent = events
                .filter(e => e.event === 'labeled' && e.label?.name === CONTRIBUTOR)
                .pop();

              if (!labelEvent) continue;

              const labeledAt = new Date(labelEvent.created_at);
              if (labeledAt > cutoff) continue;

              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: issue.number,
                labels: [CLOSING]
              });

              const marker = '<!-- openab-stale-issue-check -->';
              const { data: comments } = await github.rest.issues.listComments({
                ...context.repo,
                issue_number: issue.number,
                per_page: 100
              });
              const alreadyCommented = comments.some(c => c.body.includes(marker));
              if (!alreadyCommented) {
                const msg = [
                  marker,
                  '> [!CAUTION]',
                  `> This issue has been waiting on the author for more than ${STALE_DAYS} days ` +
                    `(labeled \`${CONTRIBUTOR}\` since ${labeledAt.toISOString().slice(0, 10)}).`,
                  '> It will be **automatically closed in 24 hours** if there is no update.',
                  '',
                  `@${issue.user.login} — Please add a new comment to remove the \`closing-soon\` label ` +
                    'and keep this issue open.'
                ].join('\n');
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: issue.number,
                  body: msg
                });
              }

              console.log(`#${issue.number} — ${CONTRIBUTOR} since ${labeledAt.toISOString()}, added ${CLOSING}`);
            }
